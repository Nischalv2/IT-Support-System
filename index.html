<body>

<!-- LOGIN SCREEN -->
<div id="loginBox">
  <h2>Login</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none;">

  <button onclick="logout()">Logout</button>
  <button onclick="printTickets()">Print Tickets</button>

  <h1>IT Support Ticket System</h1>

  <input type="text" id="name" placeholder="Your Name">
  <input type="text" id="issue" placeholder="Issue Description">
  <button onclick="addTicket()">Submit Ticket</button>

  <h2>Tickets</h2>

  <button onclick="filterTickets('ALL')">All</button>
  <button onclick="filterTickets('Open')">Open</button>
  <button onclick="filterTickets('Resolved')">Resolved</button>

  <div id="ticketList"></div>

</div>

<script src="tickets.js"></script>
<script src="login.js"></script>
<script src="print.js"></script>
<script src="app.js"></script>

</body>
